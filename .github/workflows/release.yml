name: Build Plugin

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create/update GitHub Release and upload artifacts"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# OSSF Token-Permissions: read-all top-level; the build job opts into the
# narrower contents: write + id-token: write that it actually needs.
permissions: read-all

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Build fat package in Docker
        run: |
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "$PWD:/src" \
            -w /src \
            -e HOME=/tmp \
            -e DOTNET_CLI_HOME=/tmp \
            mcr.microsoft.com/dotnet/sdk:9.0@sha256:087fc98e5c6ffcea6c3e276c135c4a6717c589d9509a09cc22e7c634830a4db8 \
            bash -lc "chmod +x ./build.sh && ./build.sh fat"

      - name: Zip package
        run: |
          VERSION="$(grep -oPm1 '(?<=<Version>)[^<]+' src/Jellyfin.Plugin.TwoFactorAuth/Jellyfin.Plugin.TwoFactorAuth.csproj)"
          cd dist
          zip -r "Jellyfin.Plugin.TwoFactorAuthv${VERSION}.zip" "TwoFactorAuth"
          md5sum "Jellyfin.Plugin.TwoFactorAuthv${VERSION}.zip" | awk '{print toupper($1)}' > "Jellyfin.Plugin.TwoFactorAuthv${VERSION}.md5"
          sha256sum "Jellyfin.Plugin.TwoFactorAuthv${VERSION}.zip" > "Jellyfin.Plugin.TwoFactorAuthv${VERSION}.sha256"

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign release zip
        if: ${{ github.event.inputs.publish_release == 'true' }}
        run: |
          VERSION="$(grep -oPm1 '(?<=<Version>)[^<]+' src/Jellyfin.Plugin.TwoFactorAuth/Jellyfin.Plugin.TwoFactorAuth.csproj)"
          ZIP="dist/Jellyfin.Plugin.TwoFactorAuthv${VERSION}.zip"
          cosign sign-blob --yes --output-signature "${ZIP}.sig" --output-certificate "${ZIP}.pem" "$ZIP"

      - name: Upload artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: jellyfin-security-fat-package
          path: |
            dist/Jellyfin.Plugin.TwoFactorAuthv*.zip
            dist/Jellyfin.Plugin.TwoFactorAuthv*.md5
            dist/Jellyfin.Plugin.TwoFactorAuthv*.sha256
            dist/Jellyfin.Plugin.TwoFactorAuthv*.sig
            dist/Jellyfin.Plugin.TwoFactorAuthv*.pem

      - name: Create or update release
        if: ${{ github.event.inputs.publish_release == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(grep -oPm1 '(?<=<Version>)[^<]+' src/Jellyfin.Plugin.TwoFactorAuth/Jellyfin.Plugin.TwoFactorAuth.csproj)"
          TAG="v${VERSION%.*}"
          ZIP="dist/Jellyfin.Plugin.TwoFactorAuthv${VERSION}.zip"
          MD5="dist/Jellyfin.Plugin.TwoFactorAuthv${VERSION}.md5"
          SHA256="dist/Jellyfin.Plugin.TwoFactorAuthv${VERSION}.sha256"
          SIG="dist/Jellyfin.Plugin.TwoFactorAuthv${VERSION}.zip.sig"
          PEM="dist/Jellyfin.Plugin.TwoFactorAuthv${VERSION}.zip.pem"
          # Release body: prefer docs/release-notes/v<VERSION>.md, then docs/release-notes/<TAG>.md,
          # then fall back to the generic blurb. Lets each release ship a real
          # changelog without editing the workflow file.
          NOTES_FILE=""
          if [ -f "docs/release-notes/v${VERSION}.md" ]; then
            NOTES_FILE="docs/release-notes/v${VERSION}.md"
          elif [ -f "docs/release-notes/${TAG}.md" ]; then
            NOTES_FILE="docs/release-notes/${TAG}.md"
          fi
          if [ -z "$NOTES_FILE" ]; then
            echo "Automated release for Jellyfin Security ${VERSION}. Sigstore-signed zip - verify with cosign verify-blob." > "$RUNNER_TEMP/notes.md"
            NOTES_FILE="$RUNNER_TEMP/notes.md"
          fi
          gh release view "$TAG" >/dev/null 2>&1 \
            && gh release edit "$TAG" --notes-file "$NOTES_FILE" \
            || gh release create "$TAG" --title "$TAG" --notes-file "$NOTES_FILE"
          gh release upload "$TAG" "$ZIP" "$MD5" "$SHA256" "$SIG" "$PEM" --clobber
