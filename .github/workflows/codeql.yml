name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 7 * * 1"

# OSSF Token-Permissions: read-all at top level so any future job that omits
# its own permissions: block defaults to least privilege.
permissions: read-all

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup .NET 9
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: "9.0.x"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3
        with:
          languages: csharp
          queries: security-extended,security-and-quality
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build
        run: |
          dotnet restore JellyfinSecurity.sln --locked-mode
          dotnet build JellyfinSecurity.sln --configuration Release --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@78ed0c7291d93e40c51b085850dc669a4c3ab73b # v3
        with:
          category: "/language:csharp"
