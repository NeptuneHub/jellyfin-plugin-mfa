name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "41 5 * * 2"
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # repo_token grants the scorecard-action enough scope to read
          # branch-protection rules (default GITHUB_TOKEN can't, which made
          # the Branch-Protection check error out with "Resource not
          # accessible by integration"). PAT is fine-grained, repo-scoped,
          # Administration: Read-only.
          repo_token: ${{ secrets.SCORECARD_TOKEN }}
          # publish_results=true publishes the score to the public
          # api.securityscorecards.dev API so the README badge can render it.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload to GitHub code-scanning
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3
        with:
          sarif_file: results.sarif
