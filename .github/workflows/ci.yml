name: CI

# Runs on every PR to main and every push to main (plus manual). Restores,
# builds Release, and runs the full test suite. .NET 8 to match the runtime
# Jellyfin 10.10.x (incl. 10.10.7) ships on.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  build-test:
    name: Build + Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET 8
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.Mfa.sln --locked-mode

      - name: Build
        run: dotnet build Jellyfin.Plugin.Mfa.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Jellyfin.Plugin.Mfa.sln --configuration Release --no-restore --verbosity normal
