name: "MFA plugin CodeQL config"

# Runs the security-extended + security-and-quality query packs (specified in
# codeql.yml). Scans only src/ and filters a small set of rules that produce
# high-noise false positives in this codebase — each exclusion is justified.

paths:
  - src/
paths-ignore:
  - tests/
  - "**/*.html"
  - "**/*.js"
  - "**/*.css"

query-filters:
  # Style-only rules — surface in editors as inline hints but add noise to the
  # SARIF dashboard without indicating real defects. The recommended analyzer
  # set already runs via NetAnalyzers, no need to dual-report.
  - exclude:
      id: cs/missed-readonly-modifier
  - exclude:
      id: cs/missed-ternary-operator
  - exclude:
      id: cs/linq/missed-where
  - exclude:
      id: cs/linq/missed-select
  - exclude:
      id: cs/useless-assignment-to-local
  - exclude:
      id: cs/constant-condition

  # cs/catch-of-all-exceptions: intentional throughout. The plugin's design is
  # "never crash Jellyfin because of us" — the SessionStarted failsafe, the
  # request/inject middleware, key-file loading, and the audit/store layers all
  # catch broadly so a transient fault can't propagate into Jellyfin's HTTP
  # pipeline or take down auth. Suppressed globally.
  - exclude:
      id: cs/catch-of-all-exceptions

  # cs/path-combine: every flagged callsite combines an admin-config-derived
  # path (PluginConfigurationsPath) with hardcoded literals (TwoFactorAuth,
  # users/, audit.json, secret.key, audit.key) — no user-controlled traversal
  # vector. Suppressed.
  - exclude:
      id: cs/path-combine

  # cs/log-forging: flagged callsites log structured key=value parameters
  # (userId, deviceId, IP, username) into templated messages — ASP.NET Core's
  # ILogger structured logging escapes control characters in the values
  # automatically. The raw-concatenation log-forging vector does not apply.
  - exclude:
      id: cs/log-forging

  # cs/static-field-written-by-instance: the flagged callsites are the
  # IndexHtmlInjectionMiddleware patched-index cache (_cachedFingerprint +
  # _cachedPatched, guarded by a lock) and its _requestsSeen Interlocked
  # counter. Both are thread-safe by design.
  - exclude:
      id: cs/static-field-written-by-instance
