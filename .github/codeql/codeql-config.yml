name: "JellyfinSecurity CodeQL config"

# Run the full security-extended + security-and-quality query packs (already
# specified in codeql.yml). Filter out a small set of rules that produce
# high-noise false positives in this codebase — each exclusion has a stated
# justification below.

paths:
  - src/
paths-ignore:
  - tests/
  - "**/*.html"
  - "**/*.js"
  - "**/*.css"

query-filters:
  # Style-only rules — surface in editors as inline hints but add noise to
  # the SARIF dashboard without indicating real defects. The recommended
  # set already runs via NetAnalyzers, no need to dual-report.
  - exclude:
      id: cs/missed-readonly-modifier
  - exclude:
      id: cs/missed-ternary-operator
  - exclude:
      id: cs/linq/missed-where
  - exclude:
      id: cs/linq/missed-select
  - exclude:
      id: cs/useless-assignment-to-local

  # cs/catch-of-all-exceptions: intentional in audit-log, webhook,
  # notification, and background-task handlers — the plugin's design is
  # "never crash Jellyfin because of us". Catching narrow exception types
  # would let a NullReferenceException or out-of-disk-space scenario
  # propagate into Jellyfin's HTTP pipeline. Suppressed globally.
  - exclude:
      id: cs/catch-of-all-exceptions

  # cs/path-combine: every flagged callsite combines admin-config-derived
  # paths (PluginConfigurationsPath) with hardcoded literals — no
  # user-controlled traversal vector. Suppressed.
  - exclude:
      id: cs/path-combine

  # cs/equality-on-floats: every flagged callsite is a default-value
  # check (`lat == 0 && lon == 0` = "no geo data") — not a comparison
  # between two computed floats. The conventional float-equality concerns
  # do not apply.
  - exclude:
      id: cs/equality-on-floats

  # cs/web/xss in NotificationService.cs: webhook payloads are sent with
  # `text/plain` Content-Type to ntfy.sh / Gotify / Discord-shaped JSON.
  # No HTML rendering surface — flagged because CodeQL doesn't trace
  # Content-Type. Reviewed and confirmed not exploitable.
  - exclude:
      id: cs/web/xss

  # cs/user-controlled-bypass in PairConfirm: the payload going into
  # `parts = payload.Split('|')` has been HMAC-verified at
  # `_cookieSigner.Verify(payload, sig)` before this line. CodeQL does
  # not model the trust boundary the HMAC verification establishes.
  - exclude:
      id: cs/user-controlled-bypass

  # cs/log-forging: every flagged callsite logs structured key=value
  # parameters (userId, deviceId, IP) into a templated message — ASP.NET
  # Core's ILogger structured logging escapes control characters in the
  # values automatically. The conventional log-forging vector via raw
  # string concatenation does not apply here.
  - exclude:
      id: cs/log-forging
